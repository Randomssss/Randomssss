<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>直播间订单监控</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #f5f7fa;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 20px;
            font-size: 24px;
        }

        .product-card {
            background: white;
            border-radius: 12px;
            padding: 15px 20px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
            transition: all 0.3s;
            gap: 15px;
        }

        .product-info {
            flex: 1;
            min-width: 0;
        }

        .product-title {
            font-weight: 600;
            color: #2c3e50;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            font-size: 15px;
        }

        .time-display {
            font-size: 48px;
            font-weight: 700;
            min-width: 140px;
            text-align: center;
            padding: 10px;
            border-radius: 8px;
            color: white;
            font-variant-numeric: tabular-nums;
            transition: background-color 0.5s;
            flex-shrink: 0;
        }

        .green {
            background: #27ae60;
        }

        .yellow {
            background: #f39c12;
        }

        .red {
            background: #e74c3c;
        }

        .time-wrapper {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .settings-icon {
            background: none;
            border: none;
            font-size: 20px;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 8px;
            transition: all 0.2s;
            line-height: 1;
            flex-shrink: 0;
        }

        .settings-icon:hover {
            background: #ecf0f1;
            transform: scale(1.05);
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(2px);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: fadeIn 0.2s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .popup-menu {
            background: white;
            border-radius: 20px;
            width: 260px;
            overflow: hidden;
            box-shadow: 0 20px 35px -10px rgba(0, 0, 0, 0.3);
            animation: slideUp 0.2s ease;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .popup-item {
            padding: 16px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
            border-bottom: 1px solid #f0f0f0;
        }

        .popup-item:last-child {
            border-bottom: none;
        }

        .popup-item:hover {
            background: #f8f9fa;
        }

        .popup-item.delete {
            color: #e74c3c;
        }

        .popup-item.delete:hover {
            background: #fee;
        }

        .popup-item .emoji {
            font-size: 20px;
        }

        .status-bar {
            text-align: center;
            color: #95a5a6;
            font-size: 12px;
            margin-top: 15px;
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        .status-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-right: 5px;
        }

        .status-dot.online {
            background: #27ae60;
            animation: pulse 2s infinite;
        }

        .status-dot.offline {
            background: #e74c3c;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .empty {
            text-align: center;
            color: #7f8c8d;
            margin: 40px;
        }

        .card-actions {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>📊 直播间订单实时监控</h1>
        <div id="products-container">
            <div class="empty">等待数据加载...</div>
        </div>
        <div class="status-bar">
            <span><span class="status-dot online" id="status-dot"></span>实时监控中</span>
            <span id="last-update">--</span>
            <span>每10秒校准</span>
        </div>
    </div>

    <script>
        let productsData = [];
        let localTimers = {};
        let pinnedProductId = localStorage.getItem('pinnedProduct') || null;
        let timerInterval = null;
        let fetchInterval = null;
        let lastProductIds = '';
        let currentPopup = null;

        function getCurrentDisplay(productId) {
            const timer = localTimers[productId];
            if (!timer) return null;

            const now = Date.now();
            const elapsed = Math.floor((now - timer.orderTime) / 1000);
            const secondsAgo = Math.max(0, elapsed);

            const minutes = Math.floor(secondsAgo / 60);
            const seconds = secondsAgo % 60;

            let color;
            if (secondsAgo <= 600) color = 'green';
            else if (secondsAgo <= 900) color = 'yellow';
            else color = 'red';

            return {
                timeDisplay: `${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`,
                color: color,
                secondsAgo: secondsAgo
            };
        }

        async function deleteOrder(productId, productTitle) {
            try {
                const response = await fetch('/api/order/delete', {
                    method: 'DELETE',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ product_id: productId })
                });
                const result = await response.json();
                if (result.st === 0) {
                    showToast(`✅ 已删除`);
                    if (pinnedProductId === productId) {
                        pinnedProductId = null;
                        localStorage.removeItem('pinnedProduct');
                    }
                    await fetchAndCalibrate();
                    return true;
                } else {
                    showToast(`❌ 删除失败`, true);
                    return false;
                }
            } catch (err) {
                console.error('删除失败:', err);
                showToast('❌ 网络错误', true);
                return false;
            }
        }

        function togglePin(productId) {
            if (pinnedProductId === productId) {
                pinnedProductId = null;
                localStorage.removeItem('pinnedProduct');
                showToast(`📌 已取消置顶`);
            } else {
                pinnedProductId = productId;
                localStorage.setItem('pinnedProduct', productId);
                showToast(`📍 已置顶`);
            }
            lastProductIds = '';
            smartRender();
        }

        function showProductPopup(productId, productTitle, event) {
            if (currentPopup) {
                currentPopup.remove();
                currentPopup = null;
            }

            const btn = event.currentTarget;
            const rect = btn.getBoundingClientRect();

            const popup = document.createElement('div');
            popup.className = 'modal-overlay';
            popup.innerHTML = `
                <div class="popup-menu" style="position: relative;">
                    <div class="popup-item" data-action="pin">
                        <span class="emoji">📌</span>
                        <span>${pinnedProductId === productId ? '取消置顶' : '置顶商品'}</span>
                    </div>
                    <div class="popup-item delete" data-action="delete">
                        <span class="emoji">🗑️</span>
                        <span>删除商品</span>
                    </div>
                </div>
            `;

            document.body.appendChild(popup);
            currentPopup = popup;

            setTimeout(() => {
                const popupMenu = popup.querySelector('.popup-menu');
                const popupRect = popupMenu.getBoundingClientRect();
                let top = rect.bottom + 5;
                let left = rect.right - popupRect.width;

                if (top + popupRect.height > window.innerHeight) {
                    top = rect.top - popupRect.height - 5;
                }
                if (left < 5) left = 5;
                if (left + popupRect.width > window.innerWidth - 5) {
                    left = window.innerWidth - popupRect.width - 5;
                }

                popupMenu.style.position = 'fixed';
                popupMenu.style.top = top + 'px';
                popupMenu.style.left = left + 'px';
                popupMenu.style.margin = '0';
            }, 10);

            popup.addEventListener('click', (e) => {
                if (e.target === popup) {
                    popup.remove();
                    currentPopup = null;
                }
            });

            const pinItem = popup.querySelector('[data-action="pin"]');
            const deleteItem = popup.querySelector('[data-action="delete"]');

            pinItem.addEventListener('click', (e) => {
                e.stopPropagation();
                togglePin(productId);
                popup.remove();
                currentPopup = null;
            });

            deleteItem.addEventListener('click', (e) => {
                e.stopPropagation();
                popup.remove();
                currentPopup = null;
                deleteOrder(productId, productTitle);
            });
        }

        document.addEventListener('click', (e) => {
            if (currentPopup && !currentPopup.contains(e.target)) {
                currentPopup.remove();
                currentPopup = null;
            }
        });

        function showToast(msg, isError = false) {
            const toast = document.createElement('div');
            toast.textContent = msg;
            toast.style.cssText = `
                position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
                background: ${isError ? '#e74c3c' : '#2c3e50'};
                color: white; padding: 10px 20px; border-radius: 30px;
                font-size: 14px; z-index: 2000; animation: fadeOutUp 2s forwards;
                white-space: nowrap; max-width: 90%; text-align: center;
            `;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2000);
        }

        async function fetchAndCalibrate() {
            try {
                const response = await fetch('/api/products');
                if (!response.ok) throw new Error('网络请求失败');

                const freshData = await response.json();
                const now = Date.now();

                productsData = freshData.map(product => {
                    const orderTime = now - (product.seconds_ago * 1000);

                    if (!localTimers[product.product_id] ||
                        Math.abs(localTimers[product.product_id].orderTime - orderTime) > 2000) {
                        localTimers[product.product_id] = {
                            orderTime: orderTime,
                            productData: product
                        };
                    }

                    return product;
                });

                const existingIds = new Set(productsData.map(p => p.product_id));
                Object.keys(localTimers).forEach(pid => {
                    if (!existingIds.has(pid)) delete localTimers[pid];
                });

                updateLastUpdateTime();
                smartRender();
            } catch (error) {
                console.error('校准失败:', error);
                document.getElementById('status-dot').className = 'status-dot offline';
            }
        }

        function smartRender() {
            const container = document.getElementById('products-container');

            if (!productsData || productsData.length === 0) {
                container.innerHTML = '<div class="empty">暂无订单数据</div>';
                lastProductIds = '';
                return;
            }

            let sortedProducts = [...productsData];
            if (pinnedProductId) {
                const pinnedIndex = sortedProducts.findIndex(p => p.product_id === pinnedProductId);
                if (pinnedIndex > -1) {
                    const [pinnedItem] = sortedProducts.splice(pinnedIndex, 1);
                    sortedProducts.unshift(pinnedItem);
                }
            }

            const newProductIds = sortedProducts.map(p => p.product_id).join(',');

            if (newProductIds === lastProductIds && container.children.length > 0) {
                sortedProducts.forEach(product => {
                    const display = getCurrentDisplay(product.product_id);
                    if (!display) return;

                    const timeElement = document.getElementById(`time-${product.product_id}`);

                    if (timeElement) {
                        timeElement.textContent = display.timeDisplay;
                        timeElement.className = `time-display ${display.color}`;
                    }
                });
                return;
            }

            lastProductIds = newProductIds;

            container.innerHTML = sortedProducts.map(product => {
                const current = getCurrentDisplay(product.product_id) || {
                    timeDisplay: product.time_display,
                    color: product.color
                };

                return `
        <div class="product-card" id="card-${escapeHtml(product.product_id)}">
            <div class="product-info">
                <div class="product-title" title="${escapeHtml(product.product_title)}">
                    ${escapeHtml(product.product_title)}
                </div>
            </div>
            <div class="card-actions">
                <button class="settings-icon" onclick="event.stopPropagation(); showProductPopup('${escapeHtml(product.product_id)}', '${escapeHtml(product.product_title.replace(/'/g, "\\'"))}', event)">
                    ⚙️
                </button>
                <div class="time-display ${current.color}" id="time-${escapeHtml(product.product_id)}">
                    ${current.timeDisplay}
                </div>
            </div>
        </div>
    `;
            }).join('');
        }

        function updateTimers() {
            for (const productId in localTimers) {
                const display = getCurrentDisplay(productId);
                if (!display) continue;

                const timeElement = document.getElementById(`time-${productId}`);
                if (timeElement) {
                    if (timeElement.textContent !== display.timeDisplay) {
                        timeElement.textContent = display.timeDisplay;
                    }
                    if (!timeElement.classList.contains(display.color)) {
                        timeElement.className = `time-display ${display.color}`;
                    }
                }
            }
        }

        function updateLastUpdateTime() {
            const now = new Date();
            const timeStr = now.toLocaleTimeString('zh-CN', { hour12: false });
            document.getElementById('last-update').textContent = `上次校准: ${timeStr}`;
            document.getElementById('status-dot').className = 'status-dot online';
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function startTimers() {
            if (timerInterval) clearInterval(timerInterval);
            if (fetchInterval) clearInterval(fetchInterval);

            timerInterval = setInterval(updateTimers, 1000);
            fetchInterval = setInterval(fetchAndCalibrate, 10000);
        }

        async function init() {
            await fetchAndCalibrate();
            startTimers();
        }

        init();
    </script>
</body>

</html>
